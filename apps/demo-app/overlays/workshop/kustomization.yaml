apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: demo
resources:
  - ../../base

labels:
  - pairs:
      workshop: bsides-sofia
      track: policy-detection

# ---------------------------------------------------------------
# WORKSHOP PATCHES — uncomment ONE at a time to trigger a violation
# ---------------------------------------------------------------

patches:
  # SCENARIO 1 — disallow-latest
  - path: bad-image-patch.yaml
    target:
      kind: Deployment
      name: demo-app

  # SCENARIO 2 — require-requests
  - path: bad-resources-patch.yaml
    target:
      kind: Deployment
      name: demo-app

  # SCENARIO 3 — disallow-privileged
  - path: bad-privileged-patch.yaml
    target:
      kind: Deployment
      name: demo-app

  # SCENARIO 4 — disallow-run-as-root
  - path: bad-run-as-root-patch.yaml
    target:
      kind: Deployment
      name: demo-app

  # SCENARIO 5 — restrict-image-registries
  - path: bad-image-registry-patch.yaml
    target:
      kind: Deployment
      name: demo-app

  # SCENARIO 6 — disallow-host-namespaces
  - path: bad-host-namespaces-patch.yaml
    target:
      kind: Deployment
      name: demo-app
