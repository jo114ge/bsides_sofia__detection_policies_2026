apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: disallow-run-as-root
  namespace: demo
  annotations:
    policies.kyverno.io/title: Disallow running as root
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod, Deployment
    policies.kyverno.io/description: >-
      Most container breakout CVEs require the process to be root (UID 0).
      Non-root containers are significantly harder to exploit.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: deny-run-as-root-deployment
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        message: "Containers must not run as root. Set runAsNonRoot:true and runAsUser to a non-zero UID."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - =(securityContext):
                      =(runAsUser): ">0"
                      =(runAsNonRoot): true

    - name: deny-run-as-root-pod
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Containers must not run as root. Set runAsNonRoot:true and runAsUser to a non-zero UID."
        pattern:
          spec:
            containers:
              - =(securityContext):
                  =(runAsUser): ">0"
                  =(runAsNonRoot): true
