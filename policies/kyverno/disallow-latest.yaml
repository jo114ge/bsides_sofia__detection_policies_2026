apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: disallow-latest
  namespace: demo
  annotations:
    policies.kyverno.io/title: Disallow latest tag
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod, Deployment
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-pinned-image-tag-deployment
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        message: "Images must not use the latest tag. Pin to a specific version."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - image: "!*:latest"

    - name: require-pinned-image-tag-pod
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Images must not use the latest tag. Pin to a specific version."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
