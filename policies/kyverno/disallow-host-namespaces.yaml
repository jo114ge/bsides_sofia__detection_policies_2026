apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: disallow-host-namespaces
  namespace: demo
  annotations:
    policies.kyverno.io/title: Disallow host namespaces
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: critical
    policies.kyverno.io/subject: Pod, Deployment
    policies.kyverno.io/description: >-
      hostPID lets a container see all processes on the node and read
      /proc/<pid>/environ. hostNetwork exposes the node network stack.
      hostIPC shares host IPC namespace. All break the pod sandbox.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: deny-host-namespaces-deployment
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        message: "Pods must not use hostNetwork, hostPID, or hostIPC. These break the sandbox boundary."
        pattern:
          spec:
            template:
              spec:
                =(hostNetwork): false
                =(hostPID): false
                =(hostIPC): false

    - name: deny-host-namespaces-pod
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Pods must not use hostNetwork, hostPID, or hostIPC. These break the sandbox boundary."
        pattern:
          spec:
            =(hostNetwork): false
            =(hostPID): false
            =(hostIPC): false
